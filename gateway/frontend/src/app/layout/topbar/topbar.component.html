<header class="topbar">
  <span class="topbar__title">Huddle DMZ Portal</span>
  <div class="topbar__spacer"></div>

  <button class="icon-btn" type="button" title="Toggle theme" (click)="themeService.toggle()">
    {{ (themeService.theme$ | async) === 'dark' ? '☀️' : '🌙' }}
  </button>

  <button class="icon-btn" type="button" title="Start devcontainer" (click)="modalService.openStart()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
  </button>

  <button class="icon-btn" type="button"
    [title]="(notificationService.enabled$ | async) ? 'Notificaties uitschakelen' : 'Notificaties inschakelen'"
    [ngClass]="{ 'icon-btn--active': notificationService.enabled$ | async }"
    (click)="notificationService.toggle()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
  </button>

  <button class="icon-btn" type="button" title="Log out" (click)="logout()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>
</header>
